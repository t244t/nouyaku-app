<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>農・みのり 農薬管理</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{
  --paper:#F2F4EF; --card:#fff; --ink:#18231A; --soft:#5A6B58; --line:#DDE3D8;
  --stem:#2E6B3A; --stem-dk:#1F4F2A; --shoudoku:#1E6F7A; --jokusou:#B5651D;
  --warn:#9A6B00; --warn-bg:#FBF3DC; --shadow:0 1px 2px rgba(24,35,26,.06),0 4px 16px rgba(24,35,26,.06);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0}
body{
  font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP",system-ui,sans-serif;
  background:var(--paper); color:var(--ink); line-height:1.55;
  font-feature-settings:"palt"; -webkit-font-smoothing:antialiased;
}
.wrap{max-width:480px;margin:0 auto;padding:0 14px 96px;min-height:100vh}
/* header */
header{position:sticky;top:0;z-index:30;background:var(--paper);padding:14px 0 8px;border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:baseline;gap:8px}
.brand .leaf{font-size:18px}
.brand h1{font-size:17px;margin:0;letter-spacing:.04em;font-weight:800}
.brand .sub{font-size:11px;color:var(--soft);letter-spacing:.08em}
.crumbs{display:flex;gap:6px;align-items:center;margin-top:8px;font-size:12px;color:var(--soft);min-height:18px}
.crumbs b{color:var(--stem-dk);font-weight:700}
/* step labels */
.eyebrow{font-size:11px;letter-spacing:.18em;color:var(--soft);font-weight:700;margin:18px 0 8px;text-transform:none;display:flex;align-items:center;gap:8px}
.eyebrow .n{display:inline-grid;place-items:center;width:18px;height:18px;border:1.5px solid var(--stem);color:var(--stem-dk);border-radius:50%;font-size:11px;font-weight:800}
/* crop grid */
.crops{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.crop{appearance:none;border:1px solid var(--line);background:var(--card);color:var(--ink);
  border-radius:13px;padding:11px 6px;font-size:13.5px;font-weight:700;cursor:pointer;
  transition:transform .08s, border-color .15s, background .15s;box-shadow:var(--shadow)}
.crop:active{transform:scale(.97)}
.crop[aria-pressed="true"]{background:var(--stem);border-color:var(--stem);color:#fff}
.crop .cnt{display:block;font-size:10.5px;font-weight:600;color:var(--soft);margin-top:2px}
.crop[aria-pressed="true"] .cnt{color:#D6E8D8}
/* filter bar */
.filter{display:none;margin-top:6px}
.filter.show{display:block}
.seg{display:flex;background:#E7EBE2;border-radius:11px;padding:3px;gap:3px}
.seg button{flex:1;border:0;background:transparent;padding:9px 4px;border-radius:9px;font-size:13px;font-weight:700;color:var(--soft);cursor:pointer}
.seg button[aria-pressed="true"]{background:#fff;color:var(--ink);box-shadow:var(--shadow)}
.seg button.s[aria-pressed="true"]{color:var(--shoudoku)}
.seg button.j[aria-pressed="true"]{color:var(--jokusou)}
.search{margin-top:8px;position:relative}
.search input{width:100%;border:1px solid var(--line);border-radius:11px;padding:11px 12px 11px 36px;font-size:15px;background:var(--card)}
.search input:focus{outline:2px solid var(--stem);border-color:var(--stem)}
.search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--soft)}
.meta{display:flex;justify-content:space-between;align-items:center;margin:14px 2px 8px;font-size:12px;color:var(--soft)}
.meta b{color:var(--ink)}
/* cards */
.list{display:flex;flex-direction:column;gap:9px}
.pcard{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--shoudoku);
  border-radius:13px;padding:12px 13px;box-shadow:var(--shadow);cursor:pointer;transition:transform .08s}
.pcard.j{border-left-color:var(--jokusou)}
.pcard:active{transform:scale(.99)}
.pc-top{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}
.pc-name{font-size:15px;font-weight:800;letter-spacing:.01em}
.pc-form{font-size:11px;color:var(--soft);font-weight:600}
.badge{font-size:10px;font-weight:800;padding:3px 7px;border-radius:999px;white-space:nowrap;letter-spacing:.02em}
.badge.direct{background:#E4F0E6;color:var(--stem-dk)}
.badge.group{background:#FBF3DC;color:var(--warn)}
.pc-target{margin-top:5px;font-size:13px;color:var(--ink)}
.pc-row{margin-top:7px;display:flex;flex-wrap:wrap;gap:5px}
.chip{font-size:11.5px;background:#F0F3EC;border-radius:7px;padding:3px 8px;color:var(--stem-dk);font-weight:700}
.chip.dose{background:#E6F0F1;color:var(--shoudoku)}
.pcard.j .chip.dose{background:#F6ECE0;color:var(--jokusou)}
.empty{text-align:center;color:var(--soft);padding:40px 10px;font-size:14px}
/* sheet */
.scrim{position:fixed;inset:0;background:rgba(24,35,26,.45);opacity:0;pointer-events:none;transition:opacity .2s;z-index:40}
.scrim.show{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:50;background:var(--paper);
  border-radius:20px 20px 0 0;max-width:480px;margin:0 auto;transform:translateY(100%);
  transition:transform .26s cubic-bezier(.2,.8,.2,1);max-height:92vh;overflow:auto;box-shadow:0 -8px 40px rgba(24,35,26,.2)}
.sheet.show{transform:translateY(0)}
.grab{width:38px;height:4px;background:var(--line);border-radius:99px;margin:9px auto 2px}
.sheet-in{padding:6px 16px 26px}
.sh-name{font-size:20px;font-weight:800;margin:6px 0 2px}
.sh-sub{font-size:12.5px;color:var(--soft)}
.sh-target{margin-top:10px;font-size:14px;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:10px 12px}
.sh-target span{color:var(--soft);font-size:11px;display:block;margin-bottom:2px}
.kv{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.kv div{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:9px 11px;font-size:14px;font-weight:700}
.kv span{display:block;color:var(--soft);font-size:11px;font-weight:600;margin-bottom:1px}
/* calc */
.calc{margin-top:16px;background:var(--stem-dk);color:#fff;border-radius:15px;padding:15px 15px 16px}
.calc h3{margin:0 0 10px;font-size:13px;letter-spacing:.12em;font-weight:700;color:#CDE6D2}
.calc .ratio{font-size:12px;color:#CDE6D2;margin-bottom:8px}
.tankrow{display:flex;align-items:center;gap:9px}
.tankrow label{font-size:13px;color:#CDE6D2;white-space:nowrap}
.tankrow input{flex:1;font-size:18px;font-weight:800;border:0;border-radius:10px;padding:10px 12px;text-align:right;font-variant-numeric:tabular-nums}
.tankrow .u{font-size:14px;color:#CDE6D2}
.result{margin-top:13px;text-align:center}
.result .big{font-size:38px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums;letter-spacing:-.01em}
.result .big .un{font-size:16px;font-weight:700;margin-left:3px;color:#CDE6D2}
.result .lbl{font-size:11px;color:#CDE6D2;letter-spacing:.1em;margin-bottom:5px}
.result .note{font-size:11px;color:#A9CDB0;margin-top:6px}
.nocalc{font-size:13px;color:#CDE6D2;text-align:center;padding:6px 0}
/* record */
.rec{margin-top:16px}
.rec h3{font-size:13px;letter-spacing:.1em;color:var(--soft);margin:0 0 9px}
.rec .field{margin-bottom:10px}
.rec label{font-size:12px;color:var(--soft);font-weight:700;display:block;margin-bottom:4px}
.rec select,.rec input{width:100%;border:1px solid var(--line);border-radius:11px;padding:11px 12px;font-size:15px;background:var(--card)}
.rec .two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.save{width:100%;margin-top:6px;border:0;background:var(--stem);color:#fff;font-size:16px;font-weight:800;
  padding:15px;border-radius:13px;cursor:pointer;letter-spacing:.04em}
.save:active{background:var(--stem-dk)}
.notice{margin-top:14px;background:var(--warn-bg);border:1px solid #EAD9A8;border-radius:11px;padding:10px 12px;font-size:12px;color:#6B4E00}
.remain{margin:-2px 0 10px;font-size:12.5px;padding:9px 11px;border-radius:10px;background:#EEF3EA;color:var(--stem-dk);font-weight:700}
.remain b{font-weight:800}
.remain.warn{background:#FBF3DC;color:#7A5800}
.remain.over{background:#FBE6E1;color:#9B2D1F}
.remain.over u{text-decoration:none;font-weight:800}
.remain.off{background:#EFEFEC;color:var(--soft);font-weight:600}
.notice b{font-weight:800}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);z-index:60;
  background:var(--ink);color:#fff;padding:12px 18px;border-radius:12px;font-size:13.5px;font-weight:700;
  opacity:0;transition:all .25s;max-width:90vw;box-shadow:var(--shadow)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.demoflag{font-size:10.5px;color:var(--warn);background:var(--warn-bg);border-radius:6px;padding:1px 6px;font-weight:700}

/* 圃場マップを開くボタン（ヘッダー） */
.mapbtn{appearance:none;border:1px solid var(--line);background:var(--card);color:var(--stem-dk);
  font-size:12px;font-weight:800;padding:6px 11px;border-radius:10px;cursor:pointer;display:inline-flex;
  align-items:center;gap:5px;box-shadow:var(--shadow)}
.mapbtn:active{transform:scale(.97)}

/* 地図ビュー（全画面オーバーレイ） */
#mapView{position:fixed;inset:0;z-index:900;background:#2b3a2b;display:none}
#mapView.show{display:block}
#map{position:absolute;inset:0}
.leaflet-tile{filter:contrast(1.04) saturate(1.02)}
.leaflet-container{background:#2b3a2b;font-family:inherit}
.mtop{position:absolute;z-index:1000;top:0;left:0;right:0;
  padding:calc(env(safe-area-inset-top) + 12px) 14px 14px;
  background:linear-gradient(to bottom,rgba(18,26,18,.8),rgba(18,26,18,0));pointer-events:none}
.mtop .row{display:flex;align-items:center;gap:10px;color:#fff;pointer-events:auto}
.mtop h2{margin:0;font-size:16px;font-weight:800;letter-spacing:.04em;text-shadow:0 1px 4px rgba(0,0,0,.5)}
.mclose{margin-left:auto;width:34px;height:34px;border-radius:10px;border:0;background:rgba(255,255,255,.92);
  display:grid;place-items:center;cursor:pointer;box-shadow:var(--shadow)}
.mlegend{margin-top:9px;display:inline-flex;gap:6px;pointer-events:auto}
.mlegend .lg{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.92);
  border-radius:999px;padding:5px 11px;font-size:11.5px;font-weight:700;box-shadow:var(--shadow)}
.mlegend .dot{width:11px;height:11px;border-radius:3px}
.dot.done{background:var(--stem)} .dot.todo{background:var(--jokusou)}
.mlegend .done-t{color:var(--stem-dk)} .mlegend .todo-t{color:var(--jokusou)}
.fld-label{background:rgba(18,26,18,.62);color:#fff;font-size:11px;font-weight:700;
  padding:2px 7px;border-radius:7px;border:0;white-space:nowrap;box-shadow:0 1px 3px rgba(0,0,0,.4)}
.locate{position:absolute;z-index:1000;right:14px;bottom:calc(env(safe-area-inset-bottom) + 18px);
  width:46px;height:46px;border-radius:14px;border:0;background:var(--card);box-shadow:var(--shadow);
  display:grid;place-items:center;cursor:pointer}
.locate svg{color:var(--stem-dk)}.locate:active{transform:scale(.95)}

/* 圃場シート（農薬シートと同じ作法・地図より前面） */
#fScrim{position:fixed;inset:0;background:rgba(24,35,26,.4);opacity:0;pointer-events:none;transition:opacity .2s;z-index:1500}
#fScrim.show{opacity:1;pointer-events:auto}
#fSheet{position:fixed;left:0;right:0;bottom:0;z-index:1600;background:var(--paper);
  border-radius:20px 20px 0 0;max-width:480px;margin:0 auto;transform:translateY(100%);
  transition:transform .26s cubic-bezier(.2,.8,.2,1);max-height:86vh;overflow:auto;
  box-shadow:0 -8px 40px rgba(24,35,26,.28);padding-bottom:calc(env(safe-area-inset-bottom) + 8px)}
#fSheet.show{transform:translateY(0)}
.fh{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:6px 0 2px}
.fh .nm{font-size:21px;font-weight:800}
.fh .grp{font-size:12px;color:var(--soft)}
.fstatus{font-size:12px;font-weight:800;padding:5px 11px;border-radius:999px;white-space:nowrap}
.fstatus.done{background:#E4F0E6;color:var(--stem-dk)}
.fstatus.todo{background:var(--warn-bg);color:var(--jokusou)}
.weed{margin-top:12px;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:12px 13px}
.weed .t{font-size:11px;letter-spacing:.1em;color:var(--soft);font-weight:700}
.weed .v{font-size:15px;font-weight:800;margin-top:3px}
.weed .v small{font-weight:600;color:var(--soft);font-size:12px}
.fkv{margin-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:9px}
.fkv div{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:10px 12px}
.fkv span{display:block;color:var(--soft);font-size:11px;font-weight:700;margin-bottom:3px}
.fkv b{font-size:15px;font-weight:800}.fkv b.empty{color:#AEB8AA}
.frecent{margin-top:12px}.frecent .t{font-size:11px;letter-spacing:.1em;color:var(--soft);font-weight:700;margin-bottom:6px}
.frow{display:flex;justify-content:space-between;gap:8px;background:var(--card);border:1px solid var(--line);
  border-radius:11px;padding:9px 12px;margin-bottom:6px;font-size:13px}
.frow .b{display:inline-block;font-size:10px;font-weight:800;border-radius:6px;padding:1px 6px;margin-right:6px}
.frow .b.s{background:#E6F0F1;color:var(--shoudoku)}.frow .b.j{background:#F6ECE0;color:var(--jokusou)}
.frow .dt{color:var(--soft);white-space:nowrap}
.fempty{color:var(--soft);font-size:13px;text-align:center;padding:12px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <span class="leaf">🌱</span>
      <h1>農薬管理</h1>
      <span class="sub">農・みのり</span>
      <button class="mapbtn" id="openMap" style="margin-left:auto">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 3 3 6v15l6-3 6 3 6-3V3l-6 3-6-3Z"/><path d="M9 3v15M15 6v15"/></svg>
        圃場マップ
      </button>
      <span id="demoFlag" class="demoflag">プレビュー版</span>
    </div>
    <div class="crumbs" id="crumbs">品目を選んでください</div>
  </header>

  <div class="eyebrow"><span class="n">1</span>品目を選ぶ</div>
  <div class="crops" id="crops"></div>

  <div class="filter" id="filter">
    <div class="eyebrow"><span class="n">2</span>用途でしぼる</div>
    <div class="seg" id="seg">
      <button data-k="all" aria-pressed="true">すべて</button>
      <button class="s" data-k="消毒" aria-pressed="false">消毒</button>
      <button class="j" data-k="除草" aria-pressed="false">除草</button>
    </div>
    <div class="search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="q" placeholder="病害虫名・農薬名でしぼり込み" inputmode="search">
    </div>
    <div class="meta"><span><b id="cnt">0</b> 件の登録</span><span id="src"></span></div>
    <div class="list" id="list"></div>
  </div>
</div>

<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet"><div class="grab"></div><div class="sheet-in" id="sheetIn"></div></div>
<div class="toast" id="toast"></div>

<!-- 圃場マップ（全画面オーバーレイ） -->
<div id="mapView">
  <div id="map"></div>
  <div class="mtop">
    <div class="row">
      <h2>圃場マップ</h2>
      <button class="mclose" id="closeMap" title="閉じる">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1F4F2A" stroke-width="2.4"><path d="M6 6l12 12M18 6 6 18"/></svg>
      </button>
    </div>
    <div class="mlegend">
      <span class="lg"><span class="dot done"></span><span class="done-t">除草済み</span></span>
      <span class="lg"><span class="dot todo"></span><span class="todo-t">未処理</span></span>
    </div>
  </div>
  <button class="locate" id="locate" title="現在地">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3.2"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
  </button>
</div>
<div id="fScrim"></div>
<div id="fSheet"><div class="grab"></div><div class="sheet-in" id="fSheetIn"></div></div>

<script>
/* ============== 設定（デプロイ時に書き換え） ============== */
const CONFIG = {
  // GitHub Pages 上の品目別JSONの場所（末尾スラッシュ込み）
  DATA_BASE: "https://t244t.github.io/nouyaku-app/data/",
  // 散布記録を書き込むGASのURL（健康管理アプリと同じGET方式）
  GAS_URL:   "https://script.google.com/macros/s/AKfycbzrKD24LhH_AKetCGNIAHvAFv44EaJIzDMOUI6YFVskY9W2dJj1aBOjW1Im3RBAZfqR/exec", // 例: https://script.google.com/macros/s/XXXX/exec
  // 農薬アプリ用に新規作成するLIFF ID
  LIFF_ID:   "", // 例: 2010xxxxxx-xxxxxxxx
  LINE_USER: "Uf760e5551fafc369a0a2527dc30cf563" // LINE外プレビュー時の仮ID
};
/* 圃場（記憶済みの7か所） */
const FIELDS = ["ねぎ前上","ねぎ前下","ねぎ横畑","ねぎ横畑先","みかん山","羽根戸田んぼ","西貝塚畑"];
/* 18品目（slugはJSONファイル名） */
const CROPS = [
 ["お米","kome"],["なす","nasu"],["きゅうり","kyuri"],["キャベツ","kyabetsu"],
 ["じゃがいも","jagaimo"],["スナップ\nエンドウ","endou"],["さつまいも","satsumaimo"],["オクラ","okura"],
 ["トウモロコシ","corn"],["ピーマン","piman"],["トマト","tomato"],["落花生","rakkasei"],
 ["レタス","retasu"],["ししとう","shishito"],["ホウレン草","horenso"],["にんにく","ninniku"],
 ["人参","ninjin"],["玉ねぎ","tamanegi"]

/* ---- LIFF初期化（LINE内ならユーザーIDを自動取得） ---- */
async function initLiff(){
  if(!CONFIG.LIFF_ID || typeof liff==='undefined') return;
  try{
    await liff.init({liffId: CONFIG.LIFF_ID});
    if(liff.isLoggedIn()){
      const p = await liff.getProfile();
      if(p && p.userId) CONFIG.LINE_USER = p.userId;
      const f=document.getElementById('demoFlag'); if(f) f.style.display='none';
    }
  }catch(e){ /* LINE外・未設定時はプレビューとして動作 */ }
}

async function selectCrop(name,slug,btn){
  document.querySelectorAll('.crop').forEach(c=>c.setAttribute('aria-pressed','false'));
  btn.setAttribute('aria-pressed','true');
  state.crop=name; state.slug=slug; state.q=''; document.getElementById('q').value='';
  document.getElementById('crumbs').innerHTML = `<b>${name}</b> の登録農薬`;
  document.getElementById('filter').classList.add('show');
  document.getElementById('list').innerHTML = '<div class="empty">読み込み中…</div>';
  // 1) 埋め込みサンプル 2) GitHub Pages の JSON
  let d = SAMPLE[slug] || null, src='';
  if(d){ src='プレビュー用サンプル'; }
  else {
    try{
      const r = await fetch(CONFIG.DATA_BASE+slug+'.json');
      if(!r.ok) throw 0;
      d = await r.json(); src='FAMIC登録情報 '+(d.更新||'');
    }catch(e){
      document.getElementById('list').innerHTML =
        `<div class="empty">この品目のデータはデプロイ後に表示されます。<br><small>(${CONFIG.DATA_BASE}${slug}.json を配置)</small></div>`;
      document.getElementById('cnt').textContent='0'; return;
    }
  }
  state.data=d; document.getElementById('src').textContent=src;
  render();
  document.getElementById('filter').scrollIntoView({behavior:'smooth',block:'start'});
}

  let rows=state.data.農薬.slice();
  if(state.filter!=='all') rows=rows.filter(r=>r.区===state.filter);
  if(state.q){ const q=state.q.toLowerCase();
    rows=rows.filter(r=>(r.名+r.虫+r.成).toLowerCase().includes(q)); }
  document.getElementById('cnt').textContent=rows.length;
  const list=document.getElementById('list');
  if(!rows.length){ list.innerHTML='<div class="empty">該当する登録がありません</div>'; return; }
  list.innerHTML='';
  rows.slice(0,300).forEach(r=>{

/* ---- 希釈の倍率を抽出 ---- */
function parseBai(s){
  s=(s||'').replace(/,/g,'');
  let m=s.match(/(\d+(?:\.\d+)?)\s*[~〜]\s*(\d+(?:\.\d+)?)\s*倍/);
  if(m) return {type:'range',a:+m[1],b:+m[2]};
  m=s.match(/(\d+(?:\.\d+)?)\s*倍/);
  if(m) return {type:'single',a:+m[1]};
  return null;
}
function doseText(tankL,bai){
  // 薬量(mL) = タンク容量(L) × 1000 / 倍率
  const f=v=>{ const mL=tankL*1000/v; return mL>=1000?(mL/1000).toFixed(mL/1000>=10?0:2)+'L':mL.toFixed(mL>=100?0:1)+'mL'; };
  if(bai.type==='single') return {val:f(bai.a),sub:`${tankL}L ÷ ${bai.a}倍`};
  return {val:f(bai.b)+'〜'+f(bai.a),sub:`${bai.b}〜${bai.a}倍で希釈`};
}
/* 「3回以内」→3 などラベル上限を抽出 */
function parseKaisu(s){ const m=String(s||'').match(/(\d+)\s*回/); return m?+m[1]:null; }

/* 残使用回数：圃場が決まったら今期の使用済み回数をGASから取得 */
async function updateRemaining(){
  const el=document.getElementById('remain'); if(!el) return;
  const r=state.current, max=parseKaisu(r.回);
  const field=document.getElementById('field').value;
  if(!CONFIG.GAS_URL){ el.className='remain off';
    el.innerHTML='残回数の自動集計はGAS接続後に表示されます'; return; }
  el.className='remain'; el.textContent='今期の使用回数を確認中…';
  try{
    const u=CONFIG.GAS_URL+'?action=remaining&'+new URLSearchParams(
      {品目:state.crop,圃場:field,農薬名:r.名}).toString();
    const res=await(await fetch(u)).json();
    const used=res.used||0;
    if(max==null){ el.className='remain'; el.innerHTML=`<b>${field}</b>：今期 使用${used}回（上限はラベルで確認）`; return; }
    const left=max-used;
    el.className='remain'+(left<=0?' over':left===1?' warn':'');
    el.innerHTML=`<b>${field}</b>：今期 使用${used}回 / 上限${max}回　`+
      (left<=0?`<u>残り0回・上限到達</u>`:`残り${left}回`);
  }catch(e){ el.className='remain off'; el.textContent='使用回数を取得できませんでした'; }
}

  const today=new Date().toISOString().slice(0,10);
  document.getElementById('sheetIn').innerHTML=`
    <div class="sh-name">${esc(r.名)}</div>
    <div class="sh-sub">${esc(r.剤)}・${esc(r.成)}　/　${r.区==='除草'?'除草':'消毒'}　登録番号 ${esc(r.番)}</div>
    <div class="sh-target"><span>適用（対象）</span>${esc(r.虫)}</div>
    <div class="kv">
      <div><span>希釈倍数・使用量</span>${esc(r.希||'—')}</div>
      <div><span>使用時期</span>${esc(r.期||'—')}</div>
      <div><span>本剤の使用回数</span>${esc(r.回||'—')}</div>
      <div><span>使用方法</span>${esc(r.法||'—')}</div>
    </div>

    <div class="calc">
      <h3>希釈計算</h3>
      ${bai ? `
      <div class="ratio">登録：${esc(r.希)}</div>
      <div class="tankrow">
        <label>タンク容量</label>
        <input id="tank" type="number" inputmode="decimal" value="20" min="1" step="1">
        <span class="u">L</span>
      </div>
      <div class="result">
        <div class="lbl">必要な薬量</div>
        <div class="big" id="dose"></div>
        <div class="note" id="dosesub"></div>
      </div>` : `<div class="nocalc">この登録は倍率希釈ではありません（${esc(r.希||'使用量指定')}）。<br>使用量はラベルでご確認ください。</div>`}
    </div>

    <div class="rec">
      <h3>散布を記録</h3>
      <div class="field"><label>圃場</label>
        <select id="field">${FIELDS.map(f=>`<option>${f}</option>`).join('')}</select></div>
      <div class="remain off" id="remain"></div>
      <div class="two">
        <div class="field"><label>散布日</label><input id="date" type="date" value="${today}"></div>
        <div class="field"><label>使用量</label><input id="amt" placeholder="例：5mL / 1袋"></div>
      </div>
      <div class="field"><label>メモ（任意）</label><input id="memo" placeholder="天候・対象の状況など"></div>
      <button class="save" id="saveBtn">この内容で記録する</button>
      <div class="notice"><b>確認：</b>実際の使用前に、必ず製品ラベルで適用作物・希釈・使用回数・収穫前日数をご確認ください（FAMIC登録情報より）。</div>
    </div>`;
  // 計算ライブ更新
  if(bai){
    const upd=()=>{ const t=parseFloat(document.getElementById('tank').value)||0;
      if(t<=0){document.getElementById('dose').textContent='—';document.getElementById('dosesub').textContent='';return;}
      const d=doseText(t,bai); document.getElementById('dose').innerHTML=d.val.replace(/(mL|L)/g,'<span class="un">$1</span>');
      document.getElementById('dosesub').textContent=d.sub; };
    document.getElementById('tank').oninput=upd; upd();
  }
  document.getElementById('saveBtn').onclick=saveRecord;
  document.getElementById('field').onchange=updateRemaining;
  updateRemaining();
  document.getElementById('scrim').classList.add('show');
  document.getElementById('sheet').classList.add('show');
}
function closeSheet(){ document.getElementById('scrim').classList.remove('show');
  document.getElementById('sheet').classList.remove('show'); }
document.getElementById('scrim').onclick=closeSheet;

function saveRecord(){
  const r=state.current;
  const rec={
    line_user:CONFIG.LINE_USER, 品目:state.crop, 農薬名:r.名, 区分:r.区,
    対象:r.虫, 圃場:document.getElementById('field').value,
    散布日:document.getElementById('date').value, 使用量:document.getElementById('amt').value,
    希釈:r.希, 登録番号:r.番, メモ:document.getElementById('memo').value
  };
  if(!CONFIG.GAS_URL){
    closeSheet();
    toast('記録内容を確認しました（GAS未接続のため保存はされていません）');
    console.log('記録プレビュー →', rec);
    return;
  }
  // 本番：GASへGETで送信（健康管理アプリと同じCORS回避方式）
  const url=CONFIG.GAS_URL+'?action=addSpray&'+new URLSearchParams(rec).toString();
  fetch(url).then(r=>r.json()).then(()=>{closeSheet();toast('記録しました');})
    .catch(()=>toast('保存に失敗しました。通信を確認してください'));
}

let tg; function toast(msg){ const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show'); clearTimeout(tg);
  tg=setTimeout(()=>t.classList.remove('show'),2600); }
function esc(s){ return String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

/* ============== 圃場マップ ============== */
const FIELDS_GEOJSON = {"type":"FeatureCollection","features":[{"type":"Feature","properties":{"name":"ねぎ前上","group":"圃場","栽培作物":"オクラ,カボチャ,バターピーナッツ","面積":"3,145","所有":"所有","所有者":"農・みのり","住所":"糸島市飯原字片山崎1671番地","備考":"2023.4〜取得"},"geometry":{"type":"Polygon","coordinates":[[[130.19948835,33.51183759],[130.20009257,33.51183759],[130.20009257,33.51234137],[130.19948835,33.51234137],[130.19948835,33.51183759]]]}},{"type":"Feature","properties":{"name":"ねぎ前下","group":"圃場","栽培作物":"菜の花","面積":"2,025","所有":"所有","所有者":"農・みのり","住所":"糸島市飯原字片山崎1676番地","備考":"2023.4〜取得"},"geometry":{"type":"Polygon","coordinates":[[[130.19950975,33.51261206],[130.19999459,33.51261206],[130.19999459,33.5130163],[130.19950975,33.5130163],[130.19950975,33.51261206]]]}},{"type":"Feature","properties":{"name":"ねぎ横畑","group":"圃場","栽培作物":"","面積":"2,424","所有":"未定","所有者":"古川氏","住所":"糸島市飯原字片山崎1677-1番地","備考":"未定"},"geometry":{"type":"Polygon","coordinates":[[[130.20024386,33.51302697],[130.20077432,33.51302697],[130.20077432,33.51346924],[130.20024386,33.51346924],[130.20024386,33.51302697]]]}},{"type":"Feature","properties":{"name":"ねぎ横畑先","group":"圃場","栽培作物":"","面積":"327","所有":"未定","所有者":"重松氏","住所":"糸島市飯原字片山崎1678-1番地","備考":"未定"},"geometry":{"type":"Polygon","coordinates":[[[130.20092178,33.51303957],[130.20111661,33.51303957],[130.20111661,33.51320201],[130.20092178,33.51320201],[130.20092178,33.51303957]]]}},{"type":"Feature","properties":{"name":"みかん山","group":"圃場","栽培作物":"デコポン、アンコールオレンジ","面積":"","所有":"未定","所有者":"農・みのり","住所":"糸島市加也","備考":"未定"},"geometry":{"type":"Polygon","coordinates":[[[130.13948813,33.57713067],[130.13997033,33.57713067],[130.13997033,33.5775324],[130.13948813,33.5775324],[130.13948813,33.57713067]]]}},{"type":"Feature","properties":{"name":"羽根戸田んぼ","group":"圃場","栽培作物":"水稲 ヒノヒカリ","面積":"1,374","所有":"所有","所有者":"農・みのり","住所":"福岡市西区大字飯盛字キシノ上25","備考":"未定"},"geometry":{"type":"Polygon","coordinates":[[[130.32007625,33.54062751],[130.32047575,33.54062751],[130.32047575,33.54096049],[130.32007625,33.54096049],[130.32007625,33.54062751]]]}},{"type":"Feature","properties":{"name":"西貝塚畑","group":"圃場","栽培作物":"玉ねぎ、にんにく、人参、ホウレン草","面積":"1,100","所有":"借地","所有者":"熊本氏","住所":"糸島市志摩西貝塚","備考":"2025.11〜開始"},"geometry":{"type":"Polygon","coordinates":[[[130.1420742,33.57484303],[130.1424318,33.57484303],[130.1424318,33.57514097],[130.1420742,33.57514097],[130.1420742,33.57484303]]]}}]};
const WEED_WINDOW_DAYS = 30; // この日数以内に除草記録があれば「除草済み」
let mapObj=null, mapRecords=[], mapStatus={}, layerByName={}, meMarker=null, mapReady=false;

function pd(s){ const m=String(s||'').match(/(\d{4})[-/](\d{1,2})[-/](\d{1,2})/); return m? new Date(+m[1],+m[2]-1,+m[3]):null; }
function daysAgo(d){ return Math.floor((Date.now()-d.getTime())/86400000); }
function fmtD(d){ return d? d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate():'—'; }
function getCss(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }

async function loadFieldStatus(){
  mapStatus={}; mapRecords=[];
  if(!CONFIG.GAS_URL) return;
  try{ const r=await fetch(CONFIG.GAS_URL+'?action=listSpray'); const j=await r.json(); mapRecords=(j&&j.records)?j.records:[]; }catch(e){ mapRecords=[]; }
  mapRecords.forEach(rec=>{
    const f=String(rec['圃場']||''); if(!f)return;
    const d=pd(rec['散布日']); const ku=String(rec['区分']||'');
    if(!mapStatus[f]) mapStatus[f]={done:false,lastWeed:null,weedCount:0};
    const s=mapStatus[f];
    if(ku.indexOf('除草')>=0){ s.weedCount++; if(d&&(!s.lastWeed||d>s.lastWeed)) s.lastWeed=d; }
  });
  Object.values(mapStatus).forEach(s=>{ s.done = s.lastWeed && daysAgo(s.lastWeed)<=WEED_WINDOW_DAYS; });
}
function fStyle(name){ const done=mapStatus[name]&&mapStatus[name].done; const c=done?getCss('--stem'):getCss('--jokusou'); return {color:c,weight:2.5,opacity:.95,fillColor:c,fillOpacity:.28}; }
function buildLayers(){
  layerByName={};
  const layer=L.geoJSON(FIELDS_GEOJSON,{
    style:f=>fStyle(f.properties.name),
    onEachFeature:(f,lyr)=>{
      const name=f.properties.name; layerByName[name]=lyr;
      lyr.on('click',()=>openField(f.properties));
      const c=lyr.getBounds().getCenter();
      L.marker(c,{icon:L.divIcon({className:'',html:'<div class="fld-label">'+esc(name)+'</div>',iconSize:[0,0]}),interactive:false}).addTo(mapObj);
    }
  }).addTo(mapObj);
  try{ mapObj.fitBounds(layer.getBounds().pad(0.25)); }catch(e){}
}
async function initMap(){
  if(mapReady) return; mapReady=true;
  mapObj=L.map('map',{zoomControl:false}).setView([33.5563,130.1972],16);
  L.control.zoom({position:'bottomleft'}).addTo(mapObj);
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:19,attribution:'衛星写真 © Esri, Maxar'}).addTo(mapObj);
  mapObj.on('locationfound',e=>{ if(meMarker) mapObj.removeLayer(meMarker); meMarker=L.circleMarker(e.latlng,{radius:7,color:'#fff',weight:2,fillColor:'#1E6F7A',fillOpacity:1}).addTo(mapObj); });
  await loadFieldStatus();
  buildLayers();
  setTimeout(()=>mapObj.invalidateSize(),60);
}
function openField(p){
  const name=p.name;
  const s=mapStatus[name]||{done:false,lastWeed:null,weedCount:0};
  const recent=mapRecords.filter(r=>String(r['圃場'])===name)
    .map(r=>({nm:r['農薬名'],ku:String(r['区分']||''),d:pd(r['散布日'])}))
    .sort((a,b)=>(b.d?b.d:0)-(a.d?a.d:0)).slice(0,4);
  const meta=k=>{ const v=(p[k]||'').toString().trim(); return v?'<b>'+esc(v)+'</b>':'<b class="empty">未登録</b>'; };
  const weedLine=s.lastWeed?'<div class="v">'+fmtD(s.lastWeed)+' <small>（'+daysAgo(s.lastWeed)+'日前・通算'+s.weedCount+'回）</small></div>':'<div class="v"><span style="color:#AEB8AA">記録なし</span></div>';
  document.getElementById('fSheetIn').innerHTML=
    '<div class="fh"><div><div class="nm">'+esc(name)+'</div><div class="grp">'+esc(p.group||'')+'</div></div>'+
      '<span class="fstatus '+(s.done?'done':'todo')+'">'+(s.done?'除草済み':'未処理')+'</span></div>'+
    '<div class="weed"><div class="t">最終除草</div>'+weedLine+'</div>'+
    '<div class="fkv">'+
      '<div><span>栽培作物</span>'+meta('栽培作物')+'</div>'+
      '<div><span>面積</span>'+(p["面積"]?('<b>'+esc(p["面積"])+' ㎡</b>'):'<b class="empty">未登録</b>')+'</div>'+
      '<div><span>所有形態</span>'+meta('所有')+'</div>'+
      '<div><span>所有者</span>'+meta('所有者')+'</div></div>'+
    '<div class="weed" style="margin-top:9px"><div class="t">住所</div><div class="v" style="font-size:13px">'+(p["住所"]?esc(p["住所"]):'—')+'</div></div>'+
    (p["備考"]?('<div class="weed" style="margin-top:9px"><div class="t">備考</div><div class="v" style="font-size:13px">'+esc(p["備考"])+'</div></div>'):'')+
    '<div class="frecent"><div class="t">直近の散布</div>'+
    (recent.length?recent.map(r=>'<div class="frow"><div><span class="b '+(r.ku.indexOf('除草')>=0?'j':'s')+'">'+(r.ku.indexOf('除草')>=0?'除草':'消毒')+'</span>'+esc(r.nm||'—')+'</div><div class="dt">'+fmtD(r.d)+'</div></div>').join(''):'<div class="fempty">この圃場の散布記録はまだありません。</div>')+
    '</div>';
  document.getElementById('fScrim').classList.add('show');
  document.getElementById('fSheet').classList.add('show');
  Object.values(layerByName).forEach(l=>l.setStyle&&l.setStyle({weight:2.5}));
  if(layerByName[name]) layerByName[name].setStyle({weight:5});
}
function closeFieldSheet(){ document.getElementById('fScrim').classList.remove('show'); document.getElementById('fSheet').classList.remove('show'); Object.values(layerByName).forEach(l=>l.setStyle&&l.setStyle({weight:2.5})); }
document.getElementById('fScrim').onclick=closeFieldSheet;
document.getElementById('openMap').onclick=async()=>{ document.getElementById('mapView').classList.add('show'); await initMap(); setTimeout(()=>mapObj&&mapObj.invalidateSize(),80); };
document.getElementById('closeMap').onclick=()=>{ closeFieldSheet(); document.getElementById('mapView').classList.remove('show'); };
document.getElementById('locate').onclick=()=>{ if(mapObj) mapObj.locate({setView:true,maxZoom:17}); };

</script>
