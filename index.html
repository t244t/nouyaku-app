<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>農・みのり 農場管理</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{
  --paper:#F2F4EF; --card:#fff; --ink:#18231A; --soft:#5A6B58; --line:#DDE3D8;
  --stem:#2E6B3A; --stem-dk:#1F4F2A; --shoudoku:#1E6F7A; --jokusou:#B5651D;
  --warn:#9A6B00; --warn-bg:#FBF3DC; --shadow:0 1px 2px rgba(24,35,26,.06),0 4px 16px rgba(24,35,26,.06);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0}
body{
  font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP",system-ui,sans-serif;
  background:var(--paper); color:var(--ink); line-height:1.55;
  font-feature-settings:"palt"; -webkit-font-smoothing:antialiased;
}
.wrap{max-width:480px;margin:0 auto;padding:0 14px 96px;min-height:100vh}
/* header */
header{position:sticky;top:0;z-index:30;background:var(--paper);padding:14px 0 8px;border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:baseline;gap:8px}
.brand .leaf{font-size:18px}
.brand h1{font-size:17px;margin:0;letter-spacing:.04em;font-weight:800}
.brand .sub{font-size:11px;color:var(--soft);letter-spacing:.08em}
.crumbs{display:flex;gap:6px;align-items:center;margin-top:8px;font-size:12px;color:var(--soft);min-height:18px}
.crumbs b{color:var(--stem-dk);font-weight:700}
/* step labels */
.eyebrow{font-size:11px;letter-spacing:.18em;color:var(--soft);font-weight:700;margin:18px 0 8px;text-transform:none;display:flex;align-items:center;gap:8px}
.eyebrow .n{display:inline-grid;place-items:center;width:18px;height:18px;border:1.5px solid var(--stem);color:var(--stem-dk);border-radius:50%;font-size:11px;font-weight:800}
/* crop grid */
.crops{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.crop{appearance:none;border:1px solid var(--line);background:var(--card);color:var(--ink);
  border-radius:13px;padding:11px 6px;font-size:13.5px;font-weight:700;cursor:pointer;
  transition:transform .08s, border-color .15s, background .15s;box-shadow:var(--shadow)}
.crop:active{transform:scale(.97)}
.crop[aria-pressed="true"]{background:var(--stem);border-color:var(--stem);color:#fff}
.crop .cnt{display:block;font-size:10.5px;font-weight:600;color:var(--soft);margin-top:2px}
.crop[aria-pressed="true"] .cnt{color:#D6E8D8}
/* filter bar */
.filter{display:none;margin-top:6px}
.filter.show{display:block}
.seg{display:flex;background:#E7EBE2;border-radius:11px;padding:3px;gap:3px}
.seg button{flex:1;border:0;background:transparent;padding:9px 4px;border-radius:9px;font-size:13px;font-weight:700;color:var(--soft);cursor:pointer}
.seg button[aria-pressed="true"]{background:#fff;color:var(--ink);box-shadow:var(--shadow)}
.seg button.s[aria-pressed="true"]{color:var(--shoudoku)}
.seg button.j[aria-pressed="true"]{color:var(--jokusou)}
.search{margin-top:8px;position:relative}
.search input{width:100%;border:1px solid var(--line);border-radius:11px;padding:11px 12px 11px 36px;font-size:15px;background:var(--card)}
.search input:focus{outline:2px solid var(--stem);border-color:var(--stem)}
.search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--soft)}
.meta{display:flex;justify-content:space-between;align-items:center;margin:14px 2px 8px;font-size:12px;color:var(--soft)}
.meta b{color:var(--ink)}
/* cards */
.list{display:flex;flex-direction:column;gap:9px}
.pcard{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--shoudoku);
  border-radius:13px;padding:12px 13px;box-shadow:var(--shadow);cursor:pointer;transition:transform .08s}
.pcard.j{border-left-color:var(--jokusou)}
.pcard:active{transform:scale(.99)}
.pc-top{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}
.pc-name{font-size:15px;font-weight:800;letter-spacing:.01em}
.pc-form{font-size:11px;color:var(--soft);font-weight:600}
.badge{font-size:10px;font-weight:800;padding:3px 7px;border-radius:999px;white-space:nowrap;letter-spacing:.02em}
.badge.direct{background:#E4F0E6;color:var(--stem-dk)}
.badge.group{background:#FBF3DC;color:var(--warn)}
.pc-target{margin-top:5px;font-size:13px;color:var(--ink)}
.pc-row{margin-top:7px;display:flex;flex-wrap:wrap;gap:5px}
.chip{font-size:11.5px;background:#F0F3EC;border-radius:7px;padding:3px 8px;color:var(--stem-dk);font-weight:700}
.chip.dose{background:#E6F0F1;color:var(--shoudoku)}
.pcard.j .chip.dose{background:#F6ECE0;color:var(--jokusou)}
.empty{text-align:center;color:var(--soft);padding:40px 10px;font-size:14px}
/* sheet */
.scrim{position:fixed;inset:0;background:rgba(24,35,26,.45);opacity:0;pointer-events:none;transition:opacity .2s;z-index:1700}
.scrim.show{opacity:1;pointer-events:auto}
.tankpreset{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
.tankpreset button{flex:1 0 auto;min-width:52px;background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.32);border-radius:9px;padding:7px 4px;font-size:13px;font-weight:700;cursor:pointer}
.tankpreset button:active{background:rgba(255,255,255,.32)}
#alertBar{margin:2px 0 6px}
.alert{display:flex;gap:9px;align-items:flex-start;border-radius:12px;padding:10px 12px;margin:6px 0;font-size:.86rem;line-height:1.5;border:1px solid}
.alert .ai{font-size:1.1rem;line-height:1.2}
.alert .at{font-weight:700;margin-bottom:1px}
.alert.storm{background:#fdecec;border-color:#f3b9b9;color:#9a2222}
.alert.wind{background:#fff4e9;border-color:#f0c9a0;color:#9a5a1a}
.alert.snow{background:#eaf2fb;border-color:#bcd5f0;color:#1a4e8a}
.alert.dry{background:#fff6e5;border-color:#f0dca8;color:#8a5a00}
.alert.disease{background:#f0f6ee;border-color:#cfe3c4;color:#3a6b2e}
.alert.calm{background:#f4f6f4;border-color:var(--line);color:var(--sub)}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:1750;background:var(--paper);
  border-radius:20px 20px 0 0;max-width:480px;margin:0 auto;transform:translateY(100%);
  transition:transform .26s cubic-bezier(.2,.8,.2,1);max-height:92vh;overflow:auto;box-shadow:0 -8px 40px rgba(24,35,26,.2)}
.sheet.show{transform:translateY(0)}
.grab{width:38px;height:4px;background:var(--line);border-radius:99px;margin:9px auto 2px}
.sheet-in{padding:6px 16px 26px}
.sh-name{font-size:20px;font-weight:800;margin:6px 0 2px}
.sh-sub{font-size:12.5px;color:var(--soft)}
.sh-target{margin-top:10px;font-size:14px;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:10px 12px}
.sh-target span{color:var(--soft);font-size:11px;display:block;margin-bottom:2px}
.kv{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.kv div{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:9px 11px;font-size:14px;font-weight:700}
.kv span{display:block;color:var(--soft);font-size:11px;font-weight:600;margin-bottom:1px}
/* calc */
.calc{margin-top:16px;background:var(--stem-dk);color:#fff;border-radius:15px;padding:15px 15px 16px}
.calc h3{margin:0 0 10px;font-size:13px;letter-spacing:.12em;font-weight:700;color:#CDE6D2}
.calc .ratio{font-size:12px;color:#CDE6D2;margin-bottom:8px}
.tankrow{display:flex;align-items:center;gap:9px}
.tankrow label{font-size:13px;color:#CDE6D2;white-space:nowrap}
.tankrow input{flex:1;font-size:18px;font-weight:800;border:0;border-radius:10px;padding:10px 12px;text-align:right;font-variant-numeric:tabular-nums}
.tankrow .u{font-size:14px;color:#CDE6D2}
.result{margin-top:13px;text-align:center}
.result .big{font-size:38px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums;letter-spacing:-.01em}
.result .big .un{font-size:16px;font-weight:700;margin-left:3px;color:#CDE6D2}
.result .lbl{font-size:11px;color:#CDE6D2;letter-spacing:.1em;margin-bottom:5px}
.result .note{font-size:11px;color:#A9CDB0;margin-top:6px}
.nocalc{font-size:13px;color:#CDE6D2;text-align:center;padding:6px 0}
/* record */
.rec{margin-top:16px}
.rec h3{font-size:13px;letter-spacing:.1em;color:var(--soft);margin:0 0 9px}
.rec .field{margin-bottom:10px}
.rec label{font-size:12px;color:var(--soft);font-weight:700;display:block;margin-bottom:4px}
.rec select,.rec input{width:100%;border:1px solid var(--line);border-radius:11px;padding:11px 12px;font-size:15px;background:var(--card)}
.rec .two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.save{width:100%;margin-top:6px;border:0;background:var(--stem);color:#fff;font-size:16px;font-weight:800;
  padding:15px;border-radius:13px;cursor:pointer;letter-spacing:.04em}
.save:active{background:var(--stem-dk)}
.notice{margin-top:14px;background:var(--warn-bg);border:1px solid #EAD9A8;border-radius:11px;padding:10px 12px;font-size:12px;color:#6B4E00}
.photoprev{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.photoprev .pthumb{position:relative;width:72px;height:72px;border-radius:9px;overflow:hidden;border:1px solid var(--line)}
.photoprev .pthumb img{width:100%;height:100%;object-fit:cover;display:block}
.photoprev .pthumb .rm{position:absolute;top:2px;right:2px;width:20px;height:20px;border-radius:50%;border:0;
  background:rgba(0,0,0,.55);color:#fff;font-size:13px;line-height:20px;cursor:pointer;padding:0;text-align:center}
.remain{margin:-2px 0 10px;font-size:12.5px;padding:9px 11px;border-radius:10px;background:#EEF3EA;color:var(--stem-dk);font-weight:700}
.remain b{font-weight:800}
.remain.warn{background:#FBF3DC;color:#7A5800}
.remain.over{background:#FBE6E1;color:#9B2D1F}
.remain.over u{text-decoration:none;font-weight:800}
.remain.off{background:#EFEFEC;color:var(--soft);font-weight:600}
.notice b{font-weight:800}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);z-index:60;
  background:var(--ink);color:#fff;padding:12px 18px;border-radius:12px;font-size:13.5px;font-weight:700;
  opacity:0;transition:all .25s;max-width:90vw;box-shadow:var(--shadow)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.demoflag{font-size:10.5px;color:var(--warn);background:var(--warn-bg);border-radius:6px;padding:1px 6px;font-weight:700}

/* 圃場マップを開くボタン（ヘッダー） */
.mapbtn{appearance:none;border:1px solid var(--line);background:var(--card);color:var(--stem-dk);
  font-size:12.5px;font-weight:800;padding:8px 12px;border-radius:10px;cursor:pointer;display:inline-flex;
  align-items:center;justify-content:center;gap:5px;box-shadow:var(--shadow);flex:1}
.mapbtn:active{transform:scale(.97)}
.toolbar{display:flex;gap:8px;margin-top:10px}

/* 地図ビュー（全画面オーバーレイ） */
#mapView{position:fixed;inset:0;z-index:900;background:#2b3a2b;display:none}
#mapView.show{display:block}
#map{position:absolute;inset:0}
.leaflet-tile{filter:contrast(1.04) saturate(1.02)}
.leaflet-container{background:#2b3a2b;font-family:inherit}
.mtop{position:absolute;z-index:1000;top:0;left:0;right:0;
  padding:calc(env(safe-area-inset-top) + 12px) 14px 14px;
  background:linear-gradient(to bottom,rgba(18,26,18,.8),rgba(18,26,18,0));pointer-events:none}
.mtop .row{display:flex;align-items:center;gap:10px;color:#fff;pointer-events:auto}
.mtop h2{margin:0;font-size:16px;font-weight:800;letter-spacing:.04em;text-shadow:0 1px 4px rgba(0,0,0,.5)}
.mclose{margin-left:auto;width:34px;height:34px;border-radius:10px;border:0;background:rgba(255,255,255,.92);
  display:grid;place-items:center;cursor:pointer;box-shadow:var(--shadow)}
.maddbtn{border:0;background:rgba(255,255,255,.94);color:var(--stem-dk);font-size:12px;font-weight:800;
  padding:0 12px;height:34px;border-radius:10px;cursor:pointer;box-shadow:var(--shadow);white-space:nowrap}
.maddbtn:active{transform:scale(.96)}
.mlegend{margin-top:9px;display:inline-flex;gap:6px;pointer-events:auto}
.mlegend .lg{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.92);
  border-radius:999px;padding:5px 11px;font-size:11.5px;font-weight:700;box-shadow:var(--shadow)}
.mlegend .dot{width:11px;height:11px;border-radius:3px}
.dot.done{background:var(--stem)} .dot.todo{background:var(--jokusou)}
.mlegend .done-t{color:var(--stem-dk)} .mlegend .todo-t{color:var(--jokusou)}
.fld-label{background:rgba(18,26,18,.62);color:#fff;font-size:11px;font-weight:700;
  padding:2px 7px;border-radius:7px;border:0;white-space:nowrap;box-shadow:0 1px 3px rgba(0,0,0,.4)}
.locate{position:absolute;z-index:1000;right:14px;bottom:calc(env(safe-area-inset-bottom) + 18px);
  width:46px;height:46px;border-radius:14px;border:0;background:var(--card);box-shadow:var(--shadow);
  display:grid;place-items:center;cursor:pointer}
.locate svg{color:var(--stem-dk)}.locate:active{transform:scale(.95)}

/* 圃場シート（農薬シートと同じ作法・地図より前面） */
#fScrim{position:fixed;inset:0;background:rgba(24,35,26,.4);opacity:0;pointer-events:none;transition:opacity .2s;z-index:1500}
#fScrim.show{opacity:1;pointer-events:auto}
#fSheet{position:fixed;left:0;right:0;bottom:0;z-index:1600;background:var(--paper);
  border-radius:20px 20px 0 0;max-width:480px;margin:0 auto;transform:translateY(100%);
  transition:transform .26s cubic-bezier(.2,.8,.2,1);max-height:86vh;overflow:auto;
  box-shadow:0 -8px 40px rgba(24,35,26,.28);padding-bottom:calc(env(safe-area-inset-bottom) + 8px)}
#fSheet.show{transform:translateY(0)}
#dScrim{position:fixed;inset:0;background:rgba(24,35,26,.4);opacity:0;pointer-events:none;transition:opacity .2s;z-index:1500}
#dScrim.show{opacity:1;pointer-events:auto}
#dSheet{position:fixed;left:0;right:0;bottom:0;z-index:1600;background:var(--paper);
  border-radius:20px 20px 0 0;max-width:480px;margin:0 auto;transform:translateY(100%);
  transition:transform .26s cubic-bezier(.2,.8,.2,1);max-height:90vh;overflow:auto;
  box-shadow:0 -8px 40px rgba(24,35,26,.28);padding-bottom:calc(env(safe-area-inset-bottom) + 8px)}
#dSheet.show{transform:translateY(0)}
.dgcand{border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin:8px 0;background:var(--card)}
.dgcand .nm{font-weight:700;font-size:1rem;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.dgtag{font-size:.7rem;padding:1px 7px;border-radius:999px;border:1px solid var(--line)}
.dgconf-高{background:#e9f6ec;color:#1b6e2e;border-color:#bfe3c6}
.dgconf-中{background:#fff6e5;color:#9a6a00;border-color:#f0dca8}
.dgconf-低{background:#f1f1f1;color:#666}
.dgcand .lab{font-size:.72rem;color:var(--sub);margin-top:6px}
.dgcand .val{font-size:.86rem;line-height:1.5}
.dgnote{font-size:.8rem;background:#f4f8f4;border:1px solid var(--line);border-radius:10px;padding:9px 11px;margin-top:8px;color:var(--stem-dk)}
.dgwarn{font-size:.76rem;color:#8a5a00;background:#fff8e8;border:1px solid #f0dca8;border-radius:10px;padding:8px 11px;margin-top:8px}
.dgloading{text-align:center;color:var(--sub);padding:18px;font-size:.9rem}
.fh{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:6px 0 2px}
.fh .nm{font-size:21px;font-weight:800}
.fh .grp{font-size:12px;color:var(--soft)}
.fstatus{font-size:12px;font-weight:800;padding:5px 11px;border-radius:999px;white-space:nowrap}
.fstatus.done{background:#E4F0E6;color:var(--stem-dk)}
.fstatus.todo{background:var(--warn-bg);color:var(--jokusou)}
.weed{margin-top:12px;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:12px 13px}
.weed .t{font-size:11px;letter-spacing:.1em;color:var(--soft);font-weight:700}
.weed .v{font-size:15px;font-weight:800;margin-top:3px}
.weed .v small{font-weight:600;color:var(--soft);font-size:12px}
.fkv{margin-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:9px}
.fkv div{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:10px 12px}
.fkv span{display:block;color:var(--soft);font-size:11px;font-weight:700;margin-bottom:3px}
.fkv b{font-size:15px;font-weight:800}.fkv b.empty{color:#AEB8AA}
.frecent{margin-top:12px}.frecent .t{font-size:11px;letter-spacing:.1em;color:var(--soft);font-weight:700;margin-bottom:6px}
.frow{display:flex;justify-content:space-between;gap:8px;background:var(--card);border:1px solid var(--line);
  border-radius:11px;padding:9px 12px;margin-bottom:6px;font-size:13px}
.frow .b{display:inline-block;font-size:10px;font-weight:800;border-radius:6px;padding:1px 6px;margin-right:6px}
.frow .b.s{background:#E6F0F1;color:var(--shoudoku)}.frow .b.j{background:#F6ECE0;color:var(--jokusou)}
.frow .b.w{background:#E4F0E6;color:var(--stem-dk)}
.frow .dt{color:var(--soft);white-space:nowrap}
.fempty{color:var(--soft);font-size:13px;text-align:center;padding:12px}

/* 作業報告フォーム */
.catgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:8px}
.catbtn{appearance:none;border:1px solid var(--line);background:var(--card);color:var(--ink);
  border-radius:12px;padding:12px 8px;font-size:13.5px;font-weight:700;cursor:pointer;text-align:center}
.catbtn[aria-pressed="true"]{background:var(--stem);border-color:var(--stem);color:#fff}
.subchips{display:flex;flex-wrap:wrap;gap:7px;margin-top:9px}
.subchip{appearance:none;border:1px solid var(--line);background:var(--card);color:var(--ink);
  border-radius:999px;padding:8px 13px;font-size:13px;font-weight:700;cursor:pointer}
.subchip[aria-pressed="true"]{background:var(--stem-dk);border-color:var(--stem-dk);color:#fff}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <span class="leaf">🌱</span>
      <h1>農場管理</h1>
      <span class="sub">農・みのり</span>
      <span id="demoFlag" class="demoflag" style="margin-left:auto">プレビュー版</span>
    </div>
    <div class="toolbar">
      <button class="mapbtn" id="openMap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 3 3 6v15l6-3 6 3 6-3V3l-6 3-6-3Z"/><path d="M9 3v15M15 6v15"/></svg>
        圃場マップ
      </button>
      <button class="mapbtn" id="openWork">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        作業報告・予定
      </button>
    </div>
    <div class="toolbar">
      <a class="mapbtn" href="防除予定.html">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 10h18M8 2v4M16 2v4"/></svg>
        防除予定
      </a>
      <a class="mapbtn" href="防除履歴.html">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/></svg>
        防除履歴
      </a>
    </div>
    <div class="toolbar">
      <button class="mapbtn" id="openDiag" style="flex:1;border-color:#2e7d32;color:#1b5e20">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        病害虫を写真で診断
      </button>
    </div>
    <div class="crumbs" id="crumbs">品目を選んでください</div>

/* ---- LIFF初期化（LINE内ならユーザーIDを自動取得） ---- */
async function initLiff(){
  if(!CONFIG.LIFF_ID || typeof liff==='undefined') return;
  try{
    await liff.init({liffId: CONFIG.LIFF_ID});
    if(liff.isLoggedIn()){
      const p = await liff.getProfile();
      if(p && p.userId) CONFIG.LINE_USER = p.userId;
      const f=document.getElementById('demoFlag'); if(f) f.style.display='none';
    }
  }catch(e){ /* LINE外・未設定時はプレビューとして動作 */ }
}

async function selectCrop(name,slug,btn){
  document.querySelectorAll('.crop').forEach(c=>c.setAttribute('aria-pressed','false'));
  btn.setAttribute('aria-pressed','true');
  state.crop=name; state.slug=slug; state.q=''; document.getElementById('q').value='';
  document.getElementById('crumbs').innerHTML = `<b>${name}</b> の登録農薬`;
  document.getElementById('filter').classList.add('show');
  document.getElementById('list').innerHTML = '<div class="empty">読み込み中…</div>';
  // 1) 埋め込みサンプル 2) GitHub Pages の JSON
  let d = SAMPLE[slug] || null, src='';
  if(d){ src='プレビュー用サンプル'; }
  else {
    try{
      const r = await fetch(CONFIG.DATA_BASE+slug+'.json');
      if(!r.ok) throw 0;
      d = await r.json(); src='FAMIC登録情報 '+(d.更新||'');
    }catch(e){
      document.getElementById('list').innerHTML =
        `<div class="empty">この品目のデータはデプロイ後に表示されます。<br><small>(${CONFIG.DATA_BASE}${slug}.json を配置)</small></div>`;
      document.getElementById('cnt').textContent='0'; return;
    }
  }
  state.data=d; document.getElementById('src').textContent=src;
  render();
  document.getElementById('filter').scrollIntoView({behavior:'smooth',block:'start'});
}

  let rows=state.data.農薬.slice();
  if(state.filter!=='all') rows=rows.filter(r=>r.区===state.filter);
  if(state.q){ const q=state.q.toLowerCase();
    rows=rows.filter(r=>(r.名+r.虫+r.成).toLowerCase().includes(q)); }
  document.getElementById('cnt').textContent=rows.length;
  const list=document.getElementById('list');
  if(!rows.length){ list.innerHTML='<div class="empty">該当する登録がありません</div>'; return; }
  list.innerHTML='';
  rows.slice(0,300).forEach(r=>{

/* ---- 希釈の倍率を抽出 ---- */
function parseBai(s){
  s=(s||'').replace(/,/g,'');
  let m=s.match(/(\d+(?:\.\d+)?)\s*[~〜]\s*(\d+(?:\.\d+)?)\s*倍/);
  if(m) return {type:'range',a:+m[1],b:+m[2]};
  m=s.match(/(\d+(?:\.\d+)?)\s*倍/);
  if(m) return {type:'single',a:+m[1]};
  return null;
}
function doseText(tankL,bai){
  // 薬量(mL) = タンク容量(L) × 1000 / 倍率
  const f=v=>{ const mL=tankL*1000/v; return mL>=1000?(mL/1000).toFixed(mL/1000>=10?0:2)+'L':mL.toFixed(mL>=100?0:1)+'mL'; };
  if(bai.type==='single') return {val:f(bai.a),sub:`${tankL}L ÷ ${bai.a}倍`};
  return {val:f(bai.b)+'〜'+f(bai.a),sub:`${bai.b}〜${bai.a}倍で希釈`};
}
/* 「3回以内」→3 などラベル上限を抽出 */
function parseKaisu(s){ const m=String(s||'').match(/(\d+)\s*回/); return m?+m[1]:null; }

/* 残使用回数：圃場が決まったら今期の使用済み回数をGASから取得 */
async function updateRemaining(){
  const el=document.getElementById('remain'); if(!el) return;
  const r=state.current, max=parseKaisu(r.回);
  const field=document.getElementById('field').value;
  if(!CONFIG.GAS_URL){ el.className='remain off';
    el.innerHTML='残回数の自動集計はGAS接続後に表示されます'; return; }
  el.className='remain'; el.textContent='今期の使用回数を確認中…';
  try{
    const u=CONFIG.GAS_URL+'?action=remaining&'+new URLSearchParams(
      {品目:state.crop,圃場:field,農薬名:r.名}).toString();
    const res=await(await fetch(u)).json();
    const used=res.used||0;
    if(max==null){ el.className='remain'; el.innerHTML=`<b>${field}</b>：今期 使用${used}回（上限はラベルで確認）`; return; }
    const left=max-used;
    el.className='remain'+(left<=0?' over':left===1?' warn':'');
    el.innerHTML=`<b>${field}</b>：今期 使用${used}回 / 上限${max}回　`+
      (left<=0?`<u>残り0回・上限到達</u>`:`残り${left}回`);
  }catch(e){ el.className='remain off'; el.textContent='使用回数を取得できませんでした'; }
}

  const today=new Date().toISOString().slice(0,10);

function removePhoto(i){
  pendingPhotos.splice(i,1);
  const prev=document.getElementById('photoPrev'); prev.innerHTML='';
  pendingPhotos.forEach(function(p,idx){
    const cell=document.createElement('div'); cell.className='pthumb';
    cell.innerHTML='<img src="'+p.dataUrl+'"><button type="button" class="rm" data-i="'+idx+'">×</button>';
    cell.querySelector('.rm').onclick=function(){ removePhoto(Number(this.dataset.i)); };
    prev.appendChild(cell);
  });

function resizeImage(file,maxSide){
  return new Promise(function(resolve){
    const img=new Image(); const url=URL.createObjectURL(file);
    img.onload=function(){
      let w=img.width,h=img.height;
      const s=Math.min(1,maxSide/Math.max(w,h));
      w=Math.round(w*s); h=Math.round(h*s);
      const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      let out=null; try{ out=cv.toDataURL('image/jpeg',0.85); }catch(_){}
      URL.revokeObjectURL(url); resolve(out);
    };
    img.onerror=function(){ URL.revokeObjectURL(url); resolve(null); };
    img.src=url;
  });
}
/* 記録IDにひも付けて1枚ずつPOST（Content-Type未指定＝単純リクエストでCORS回避） */

}

function renderDiagResult(j, box){

/* 病害虫名の表記ゆれ吸収（NFKC・カタカナ→ひらがな・空白除去・「類」の揺れ・部分一致） */
function normName(s){
  let x=(s||'').normalize('NFKC').replace(/\s/g,'');
  x=x.replace(/[\u30a1-\u30f6]/g, m=>String.fromCharCode(m.charCodeAt(0)-0x60)); // カナ→かな
  return x;
}
function mushiMatch(target, cand){
  let t=normName(target), c=normName(cand);
  if(!t||!c) return false;
  if(t===c) return true;
  let t2=t.replace(/類$/,''), c2=c.replace(/類$/,'');
  if(t2===c2) return true;
  if(t.indexOf(c)>=0 || c.indexOf(t)>=0) return true;
  if(t2.indexOf(c2)>=0 || c2.indexOf(t2)>=0) return true;
  return false;
}
async function showRx(idx){
  const cand=dgState.candidates[idx]; if(!cand) return;
  const box=document.getElementById('dg_result');
  if(!dgState.slug){
    box.innerHTML='<div class="dgwarn">「'+esc(dgState.crop)+'」の農薬マスタが見つかりません（品目未登録）。</div>'+
      '<button class="mapbtn" style="width:100%;margin-top:8px" onclick="backToCandidates()">← 診断候補に戻る</button>';
    return;
  }
  box.innerHTML='<div class="dgloading">'+esc(dgState.crop)+'の登録農薬を照合中…</div>';
  if(!dgState.master){
    try{
      const r=await fetch(CONFIG.DATA_BASE+dgState.slug+'.json');
      dgState.master=await r.json();
    }catch(e){
      box.innerHTML='<div class="dgwarn">農薬マスタの読み込みに失敗しました。</div>'+
        '<button class="mapbtn" style="width:100%;margin-top:8px" onclick="backToCandidates()">← 診断候補に戻る</button>';
      return;
    }
  }
  const all=(dgState.master.農薬||[]).filter(r=> r.区!=='除草' && mushiMatch(r.虫, cand.name));
  // 名＋希＋期＋法 で重複排除、直接を優先表示
  const seen={}, list=[];
  all.forEach(r=>{ const k=r.名+'|'+r.希+'|'+r.期+'|'+r.法; if(!seen[k]){ seen[k]=1; list.push(r); } });
  list.sort((a,b)=> (a.登==='直接'?0:1)-(b.登==='直接'?0:1));
  renderRx(cand, list, box);
}
function renderRx(cand, list, box){
  let html='<button class="mapbtn" style="margin-top:10px" onclick="backToCandidates()">← 診断候補に戻る</button>'+
    '<div class="lab" style="margin-top:10px;font-weight:700;color:var(--stem-dk)">'+esc(dgState.crop)+' ／ '+esc(cand.name)+' に登録のある農薬</div>';
  if(!list.length){
    html+='<div class="dgnote">この病害虫名では、'+esc(dgState.crop)+'に登録のある農薬が見つかりませんでした。診断名の表記が異なる可能性があります。別の候補も確認してみてください。</div>';
    box.innerHTML=html; return;
  }
  html+='<div class="lab">該当 '+list.length+' 件（同じ薬剤は1つにまとめています。タップで希釈計算・記録／予定へ）</div>';
  dgState.rxList=list;
  list.slice(0,40).forEach((r,i)=>{
    html+='<div class="dgcand" style="cursor:pointer" onclick="openRxRecord('+i+')">'+
      '<div class="nm">'+esc(r.名)+
        '<span class="dgtag">'+esc(r.剤||'')+'</span>'+
        (r.登==='直接'?'<span class="dgtag dgconf-高">直接登録</span>':'<span class="dgtag">グループ</span>')+
      '</div>'+
      '<div class="val" style="margin-top:4px">'+
        '希釈：'+esc(r.希||'—')+'<br>'+
        '使用時期：'+esc(r.期||'—')+' ／ 使用回数：'+esc(r.回||'—')+'<br>'+
        '使用方法：'+esc(r.法||'—')+'<br>'+
        '<span style="color:var(--sub);font-size:.78rem">対象：'+esc(r.虫||'')+'</span>'+
      '</div>'+
      '<div class="lab" style="color:#1b5e20;font-weight:700;margin-top:6px">▶ タップで希釈計算・記録／予定へ</div>'+
    '</div>';
  });
  if(list.length>40) html+='<div class="lab">ほか '+(list.length-40)+' 件（多すぎる場合は候補名で絞られています）</div>';
  html+='<div class="dgwarn">表示は'+esc(dgState.crop)+'にFAMIC登録のある農薬のみです。実際の使用前に必ずラベルで適用作物・対象・希釈・使用時期・回数をご確認ください。</div>';
  box.innerHTML=html;
}

const WEED_WINDOW_DAYS = 30; // この日数以内に除草記録があれば「除草済み」
let mapObj=null, mapRecords=[], mapWorkRecords=[], mapStatus={}, fieldList=[], fieldLayer=null, layerByName={}, meMarker=null, mapReady=false, formCoord=null, locateForForm=false, workCat=null;

function pd(s){ const m=String(s||'').match(/(\d{4})[-/](\d{1,2})[-/](\d{1,2})/); return m? new Date(+m[1],+m[2]-1,+m[3]):null; }
function daysAgo(d){ return Math.floor((Date.now()-d.getTime())/86400000); }
function fmtD(d){ return d? d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate():'—'; }
function getCss(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }
function comma(n){ n=Number(n)||0; return n? n.toLocaleString('ja-JP'):''; }
function valOf(id){ const e=document.getElementById(id); return e? e.value:''; }

// 面積(㎡)から中心まわりの四角[[lat,lon]...]を作る
function makeSquare(lat,lon,area){
  const a=(area&&area>0)?area:2000; const half=Math.sqrt(a)/2;
  const dlat=half/111320, dlon=half/(111320*Math.cos(lat*Math.PI/180));
  return [[lat-dlat,lon-dlon],[lat-dlat,lon+dlon],[lat+dlat,lon+dlon],[lat+dlat,lon-dlon]];
}

async function loadFieldStatus(){
  mapStatus={}; mapRecords=[]; mapWorkRecords=[];
  if(!CONFIG.GAS_URL) return;
  try{ const r=await fetch(CONFIG.GAS_URL+'?action=listSpray'); const j=await r.json(); mapRecords=(j&&j.records)?j.records:[]; }catch(e){ mapRecords=[]; }
  try{ const r2=await fetch(CONFIG.GAS_URL+'?action=listWork'); const j2=await r2.json(); mapWorkRecords=(j2&&j2.records)?j2.records:[]; }catch(e){ mapWorkRecords=[]; }
  mapRecords.forEach(rec=>{
    const f=String(rec['圃場']||''); if(!f)return;
    const d=pd(rec['散布日']); const ku=String(rec['区分']||'');
    if(!mapStatus[f]) mapStatus[f]={done:false,lastWeed:null,weedCount:0};
    const s=mapStatus[f];
    if(ku.indexOf('除草')>=0){ s.weedCount++; if(d&&(!s.lastWeed||d>s.lastWeed)) s.lastWeed=d; }
  });
  mapWorkRecords.forEach(rec=>{
    const f=String(rec['圃場']||''); if(!f)return;
    const d=pd(rec['作業日']); const ka=String(rec['カテゴリ']||'');
    if(!mapStatus[f]) mapStatus[f]={done:false,lastWeed:null,weedCount:0};
    const s=mapStatus[f];
    if(ka==='除草'){ s.weedCount++; if(d&&(!s.lastWeed||d>s.lastWeed)) s.lastWeed=d; }
  });
  Object.values(mapStatus).forEach(s=>{ s.done = s.lastWeed && daysAgo(s.lastWeed)<=WEED_WINDOW_DAYS; });
}

// 圃場ポップアップ用：散布記録＋作業記録を統合した「直近の作業」リスト
function recentForField(name){
  const a = mapRecords.filter(r=>String(r['圃場'])===name)
    .map(r=>({nm:r['農薬名'],badge:String(r['区分']||'')==='除草'?'除草':'消毒',cls:String(r['区分']||'')==='除草'?'j':'s',d:pd(r['散布日'])}));
  const b = mapWorkRecords.filter(r=>String(r['圃場'])===name)
    .map(r=>({nm:r['作業内容']||r['カテゴリ'],badge:r['カテゴリ'],cls:String(r['カテゴリ'])==='除草'?'j':'w',d:pd(r['作業日'])}));
  return a.concat(b).sort((x,y)=>(y.d?y.d:0)-(x.d?x.d:0)).slice(0,5);
}

// 圃場一覧をGASから取得（無ければ埋め込みseed）
async function loadFields(){
  let list=null;
  if(CONFIG.GAS_URL){
    try{
      const r=await fetch(CONFIG.GAS_URL+'?action=listFields'); const j=await r.json();
      if(j&&j.fields&&j.fields.length){
        list=j.fields.map(f=>({name:String(f['圃場名']),lat:Number(f['緯度']),lon:Number(f['経度']),
          area:Number(f['面積'])||0, '所有':f['所有']||'', '所有者':f['所有者']||'',
          '栽培作物':f['栽培作物']||'', '住所':f['住所']||'', '備考':f['備考']||''}));
      }
    }catch(e){}
  }
  fieldList = (list&&list.length)? list : FIELDS_SEED.slice();
}

function fStyle(name){ const done=mapStatus[name]&&mapStatus[name].done; const c=done?getCss('--stem'):getCss('--jokusou'); return {color:c,weight:2.5,opacity:.95,fillColor:c,fillOpacity:.28}; }

function buildLayers(){
  if(fieldLayer){ mapObj.removeLayer(fieldLayer); }
  fieldLayer=L.layerGroup().addTo(mapObj); layerByName={};
  const bounds=[];
  fieldList.forEach(f=>{
    if(!f.lat||!f.lon) return;
    const ring=makeSquare(f.lat,f.lon,f.area);
    const poly=L.polygon(ring, fStyle(f.name)).addTo(fieldLayer);
    poly.on('click',()=>openField(f));
    layerByName[f.name]=poly;
    L.marker([f.lat,f.lon],{icon:L.divIcon({className:'',html:'<div class="fld-label">'+esc(f.name)+'</div>',iconSize:[0,0]}),interactive:false}).addTo(fieldLayer);
    ring.forEach(pt=>bounds.push(pt));
  });
  try{ if(bounds.length) mapObj.fitBounds(bounds,{padding:[40,40]}); }catch(e){}
}

async function reloadMap(){ await loadFieldStatus(); await loadFields(); buildLayers(); }

async function initMap(){
  if(mapReady) return; mapReady=true;
  mapObj=L.map('map',{zoomControl:false}).setView([33.5563,130.1972],14);
  L.control.zoom({position:'bottomleft'}).addTo(mapObj);
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:19,attribution:'衛星写真 © Esri, Maxar'}).addTo(mapObj);
  mapObj.on('locationfound',e=>{
    if(locateForForm){ formCoord={lat:e.latlng.lat,lng:e.latlng.lng}; locateForForm=false; updateFormCoord(); return; }
    if(meMarker) mapObj.removeLayer(meMarker);
    meMarker=L.circleMarker(e.latlng,{radius:7,color:'#fff',weight:2,fillColor:'#1E6F7A',fillOpacity:1}).addTo(mapObj);
  });
  await reloadMap();
  setTimeout(()=>mapObj.invalidateSize(),60);
}

function openField(f){
  const name=f.name;
  const s=mapStatus[name]||{done:false,lastWeed:null,weedCount:0};
  const recent=recentForField(name);
  const meta=k=>{ const v=(f[k]||'').toString().trim(); return v?'<b>'+esc(v)+'</b>':'<b class="empty">未登録</b>'; };
  const weedLine=s.lastWeed?'<div class="v">'+fmtD(s.lastWeed)+' <small>（'+daysAgo(s.lastWeed)+'日前・通算'+s.weedCount+'回）</small></div>':'<div class="v"><span style="color:#AEB8AA">記録なし</span></div>';
  const areaTxt=f.area?('<b>'+comma(f.area)+' ㎡</b>'):'<b class="empty">未登録</b>';
  document.getElementById('fSheetIn').innerHTML=
    '<div class="fh"><div><div class="nm">'+esc(name)+'</div><div class="grp">圃場</div></div>'+
      '<span class="fstatus '+(s.done?'done':'todo')+'">'+(s.done?'除草済み':'未処理')+'</span></div>'+
    '<div class="weed"><div class="t">最終除草</div>'+weedLine+'</div>'+
    '<div class="fkv">'+
      '<div><span>栽培作物</span>'+meta('栽培作物')+'</div>'+
      '<div><span>面積</span>'+areaTxt+'</div>'+
      '<div><span>所有形態</span>'+meta('所有')+'</div>'+
      '<div><span>所有者</span>'+meta('所有者')+'</div></div>'+
    '<div class="weed" style="margin-top:9px"><div class="t">住所</div><div class="v" style="font-size:13px">'+(f['住所']?esc(f['住所']):'—')+'</div></div>'+
    (f['備考']?('<div class="weed" style="margin-top:9px"><div class="t">備考</div><div class="v" style="font-size:13px">'+esc(f['備考'])+'</div></div>'):'')+
    '<div class="frecent"><div class="t">直近の作業（散布・作業報告）</div>'+
    (recent.length?recent.map(r=>'<div class="frow"><div><span class="b '+r.cls+'">'+esc(r.badge)+'</span>'+esc(r.nm||'—')+'</div><div class="dt">'+fmtD(r.d)+'</div></div>').join(''):'<div class="fempty">この圃場の作業記録はまだありません。</div>')+
    '</div>';
  document.getElementById('fScrim').classList.add('show');
  document.getElementById('fSheet').classList.add('show');
  Object.values(layerByName).forEach(l=>l.setStyle&&l.setStyle({weight:2.5}));
  if(layerByName[name]) layerByName[name].setStyle({weight:5});
}

function closeFieldSheet(){ document.getElementById('fScrim').classList.remove('show'); document.getElementById('fSheet').classList.remove('show'); Object.values(layerByName).forEach(l=>l.setStyle&&l.setStyle({weight:2.5})); }

function updateFormCoord(){ const el=document.getElementById('ff_coord'); if(el&&formCoord) el.textContent=formCoord.lat.toFixed(6)+', '+formCoord.lng.toFixed(6); }
function parseCoord(s){
  const m=String(s||'').match(/(-?\d{1,3}(?:\.\d+)?)\s*[,、\s]\s*(-?\d{1,3}(?:\.\d+)?)/);
  if(!m) return null;
  const lat=parseFloat(m[1]), lng=parseFloat(m[2]);
  if(isNaN(lat)||isNaN(lng)||Math.abs(lat)>90||Math.abs(lng)>180) return null;
  return {lat,lng};
}

        '<div class="field"><label>所有形態</label><select id="ff_tenure"><option>所有</option><option>借地</option><option>未定</option></select></div></div>'+

    '</div>';
  updateFormCoord();
  document.getElementById('ff_paste').oninput=(e)=>{ const c=parseCoord(e.target.value); if(c){ formCoord=c; updateFormCoord(); if(mapObj) mapObj.panTo([c.lat,c.lng]); } };
  document.getElementById('ff_center').onclick=()=>{ const c=mapObj.getCenter(); formCoord={lat:c.lat,lng:c.lng}; updateFormCoord(); toast('地図の中心を使います'); };
  document.getElementById('ff_locate').onclick=()=>{ locateForForm=true; toast('現在地を取得中…'); mapObj.locate({maxZoom:17}); };
  document.getElementById('ff_save').onclick=saveField;
  document.getElementById('fScrim').classList.add('show');

function saveField(){
  const name=valOf('ff_name').trim();
  if(!name){ toast('圃場名を入力してください'); return; }
  if(!CONFIG.GAS_URL){ toast('GAS未接続のため保存できません'); return; }
  if(!formCoord){ toast('位置が取得できていません'); return; }
  const rec={圃場名:name, 緯度:formCoord.lat, 経度:formCoord.lng,
    面積:valOf('ff_area'), 所有:valOf('ff_tenure'), 所有者:valOf('ff_owner'),
    栽培作物:valOf('ff_crop'), 住所:valOf('ff_addr'), 備考:valOf('ff_memo')};
  const url=CONFIG.GAS_URL+'?action=addField&'+new URLSearchParams(rec).toString();
  fetch(url).then(r=>r.json()).then(async(j)=>{
    if(j&&j.ok){ closeFieldSheet(); toast('圃場を追加しました'); await reloadMap(); }
    else toast('保存に失敗しました'); 
  }).catch(()=>toast('保存に失敗しました。通信を確認してください'));
}

  pendingWorkPhotos=[];
  renderWorkForm();

  document.getElementById('fSheet').classList.add('show');

function renderWorkForm(){
  const today=new Date().toISOString().slice(0,10);
  const fieldOpts=(fieldList.length?fieldList.map(f=>f.name):FIELDS).map(n=>'<option>'+esc(n)+'</option>').join('');

    '<div class="rec">'+
      '<div class="field"><label>カテゴリー</label><div class="catgrid">'+catBtns+'</div>'+subHtml+'</div>'+
      '<div class="field"><label>圃場</label><select id="w_field">'+fieldOpts+'</select></div>'+
      '<div class="two">'+
        '<div class="field"><label>作業日</label><input id="w_date" type="date" value="'+today+'"></div>'+
        '<div class="field"><label>時間（任意）</label><input id="w_hours" placeholder="例：1.5h"></div></div>'+
      '<div class="field"><label>メモ（任意）</label><input id="w_memo" placeholder="天候・作業の様子など"></div>'+
      '<div class="field"><label>写真（任意・最大4枚／撮影またはアルバム）</label>'+
        '<input id="wphotos" type="file" accept="image/*" multiple style="padding:9px 12px">'+
        '<div id="wphotoPrev" class="photoprev"></div></div>'+
      '<button class="save" id="w_save">この内容で記録する</button>'+
      '<button class="save" id="w_plan" style="background:#fff;color:#1b5e20;border:1px solid #2e7d32;margin-top:8px">予定に追加（あとで実績化）</button>'+
      '<div class="note">この記録は圃場マップのポップアップ「直近の作業」にも表示されます。カテゴリーが<b>除草</b>の場合、除草済み／未処理の判定にも反映されます。</div>'+
    '</div>';
  document.querySelectorAll('.catbtn').forEach(b=>b.onclick=()=>{ workCat=b.dataset.cat; renderWorkForm(); });
  document.querySelectorAll('.subchip').forEach(b=>b.onclick=()=>{
    document.querySelectorAll('.subchip').forEach(x=>x.setAttribute('aria-pressed','false'));
    b.setAttribute('aria-pressed','true');
    const wrap=document.getElementById('wFreeWrap');
    if(b.dataset.sub==='__free'){ wrap.style.display='block'; wrap.dataset.chosen=''; }
    else{ wrap.style.display='none'; wrap.dataset.chosen=b.dataset.sub; }
  });
  const sv=document.getElementById('w_save'); if(sv) sv.onclick=saveWork;
  const pv=document.getElementById('w_plan'); if(pv) pv.onclick=savePlanWork;
  const wp=document.getElementById('wphotos'); if(wp) wp.onchange=onPickWorkPhotos;
  repaintWorkPhotos();
}
function savePlanWork(){
  if(!workCat){ toast('カテゴリーを選んでください'); return; }
  const content=currentWorkContent();
  if(!content){ toast('作業内容を選ぶか入力してください'); return; }
  const date=valOf('w_date'); if(!date){ toast('予定日（作業日欄）を選んでください'); return; }
  if(!CONFIG.GAS_URL){ toast('GAS未接続のため保存できません'); return; }
  const plan={line_user:CONFIG.LINE_USER, 圃場:valOf('w_field'), 予定日:date,
    カテゴリ:workCat, 作業内容:content, メモ:valOf('w_memo')};
  const url=CONFIG.GAS_URL+'?action=addWorkPlan&'+new URLSearchParams(plan).toString();
  fetch(url).then(r=>r.json()).then((j)=>{
    if(j&&j.ok){ closeFieldSheet(); toast('作業予定に追加しました'); }
    else toast('予定の保存に失敗しました');
  }).catch(()=>toast('予定の保存に失敗しました。通信を確認してください'));
}
function currentWorkContent(){
  if(!workCat) return '';
  const subs=WORK_CATEGORIES[workCat];
  if(!subs.length) return valOf('w_free').trim();
  const wrap=document.getElementById('wFreeWrap');
  if(wrap && wrap.dataset.chosen) return wrap.dataset.chosen;
  if(wrap && wrap.style.display!=='none') return valOf('w_free').trim();
  return '';
}
function saveWork(){
  if(!workCat){ toast('カテゴリーを選んでください'); return; }
  const content=currentWorkContent();
  if(!content){ toast('作業内容を選ぶか入力してください'); return; }
  if(!CONFIG.GAS_URL){ toast('GAS未接続のため保存できません'); return; }
  const rec={line_user:CONFIG.LINE_USER, 圃場:valOf('w_field'), 作業日:valOf('w_date'),
    カテゴリ:workCat, 作業内容:content, 時間:valOf('w_hours'), メモ:valOf('w_memo')};
  const url=CONFIG.GAS_URL+'?action=addWork&'+new URLSearchParams(rec).toString();
  const n=pendingWorkPhotos.length;
  fetch(url).then(r=>r.json()).then(async(j)=>{
    if(j&&j.ok){
      if(n>0){ toast('作業を記録しました。写真'+n+'枚を保存中…'); await uploadWorkPhotos(j.id); toast('写真'+n+'枚を保存しました'); }
      else toast('作業を記録しました');
      closeFieldSheet();
      if(mapReady) await loadFieldStatus();
    }else toast('保存に失敗しました');
  }).catch(()=>toast('保存に失敗しました。通信を確認してください'));
}

/* ===== 作業報告の写真添付（散布側の仕組みを流用・別ID） ===== */
let pendingWorkPhotos=[];
async function onPickWorkPhotos(e){
  const files=Array.from(e.target.files||[]);
  for(const f of files){
    if(pendingWorkPhotos.length>=4) break;
    const dataUrl=await resizeImage(f,1600);
    if(!dataUrl) continue;
    pendingWorkPhotos.push({name:(f.name||('work'+Date.now()+'.jpg')),dataUrl:dataUrl,mime:'image/jpeg'});
  }
  e.target.value='';
  repaintWorkPhotos();
}
function removeWorkPhoto(i){ pendingWorkPhotos.splice(i,1); repaintWorkPhotos(); }
function repaintWorkPhotos(){
  const prev=document.getElementById('wphotoPrev'); if(!prev) return;
  prev.innerHTML='';
  pendingWorkPhotos.forEach(function(p,idx){
    const cell=document.createElement('div'); cell.className='pthumb';
    cell.innerHTML='<img src="'+p.dataUrl+'"><button type="button" class="rm" data-i="'+idx+'">×</button>';
    cell.querySelector('.rm').onclick=function(){ removeWorkPhoto(Number(this.dataset.i)); };
    prev.appendChild(cell);
  });
}
async function uploadWorkPhotos(workId){
  if(!pendingWorkPhotos.length||!CONFIG.GAS_URL) return;
  for(const ph of pendingWorkPhotos){

      await fetch(CONFIG.GAS_URL,{ method:'POST',
        body:JSON.stringify({action:'uploadPhoto',記録ID:workId,種別:'作業',
          ファイル名:ph.name,mimeType:ph.mime,dataB64:ph.dataUrl}) });
    }catch(err){ /* 応答は読まない設計。保存可否はlistPhotosで確認 */ }
  }
  pendingWorkPhotos=[];
}

/* ============== 天気の先回りアラート（病害・台風・積雪・灌水） ============== */
/* しきい値はここで調整できます（糸島の実情に合わせて変更可） */
const ALERT_CFG = {
  windMs: 10,     // 平均風速(m/s) これ以上で強風注意
  windStormMs: 17,// 平均風速(m/s) これ以上は暴風・台風級
  gustMs: 20,     // 最大瞬間風速(m/s) これ以上で強風注意
  gustStormMs: 30,// 最大瞬間風速(m/s) これ以上は暴風・台風級
  snowCm: 1,      // 降雪(cm) これ以上で積雪注意
  dryDays: 4,     // 連続でまとまった雨なしと見なす日数
  dryMm: 1,       // 上記期間の降水量合計がこれ未満なら乾燥注意
  dryTmax: 25,    // かつ最高気温がこれ以上の日が含まれる場合に灌水注意
  humidDays: 2,   // 多湿が続くと見なす連続日数
  humidProb: 60,  // 降水確率がこれ以上、または降水量3mm以上を「多湿日」とする
  humidTmaxLo: 15, humidTmaxHi: 28  // 病害が出やすい気温帯
};
function md(iso){ const d=new Date(iso+'T00:00:00'); return (d.getMonth()+1)+'/'+d.getDate(); }
function dayLabel(i){ return i===0?'今日':i===1?'明日':i===2?'あさって':(i+'日後'); }
function computeAlerts(dl){
  const al=[];
  const t=dl.time||[], wind=dl.wind||[], gust=dl.gust||[], snow=dl.snow||[],
        precip=dl.precip||[], prob=dl.precip_prob||[], tmax=dl.tmax||[];
  const N=t.length;
  // 強風・台風：今後の中で最初に基準を超える日。風速に応じて段階表示
  for(let i=0;i<N;i++){
    const strong=(wind[i]>=ALERT_CFG.windMs)||(gust[i]>=ALERT_CFG.gustMs);
    if(!strong) continue;
    const storm=(wind[i]>=ALERT_CFG.windStormMs)||(gust[i]>=ALERT_CFG.gustStormMs);
    if(storm){
      al.push({type:'storm', icon:'🌀', title:'暴風・台風に注意',
        msg:dayLabel(i)+'（'+md(t[i])+'）に最大風速'+Math.round(wind[i])+'m/s・瞬間'+Math.round(gust[i])+'m/sの予報。支柱やハウスの補強、収穫の前倒し、排水の確認を。'});
    }else{
      al.push({type:'wind', icon:'🌬️', title:'強風に注意',
        msg:dayLabel(i)+'（'+md(t[i])+'）に最大風速'+Math.round(wind[i])+'m/s・瞬間'+Math.round(gust[i])+'m/sの予報。防虫ネットやマルチのめくれ、支柱の傾き、軽い資材の飛散に注意を。'});
    }
    break;
  }
  // 積雪
  for(let i=0;i<N;i++){
    if(snow[i]>=ALERT_CFG.snowCm){
      al.push({type:'snow', icon:'❄️', title:'積雪に注意',
        msg:dayLabel(i)+'（'+md(t[i])+'）に降雪'+(snow[i].toFixed(1))+'cmの予報。ハウスの雪対策、トンネルの補強、収穫の前倒しを。'});
      break;
    }
  }
  // 灌水（少雨）：今日から dryDays 日の降水量合計がほぼゼロ、かつ高温日を含む
  if(N>=ALERT_CFG.dryDays){
    let sum=0, hot=false;
    for(let i=0;i<ALERT_CFG.dryDays;i++){ sum+=(precip[i]||0); if(tmax[i]>=ALERT_CFG.dryTmax) hot=true; }
    if(sum<ALERT_CFG.dryMm){
      al.push({type:'dry', icon:'☀️', title:'乾燥・灌水の検討',
        msg:'向こう'+ALERT_CFG.dryDays+'日はまとまった雨の予報がありません'+(hot?'（高温日あり）':'')+'。乾燥に注意し、定植直後や水を好む作物は灌水の検討を。'});
    }
  }
  // 病害（多湿）：humidDays 日連続で「多湿日」かつ適温
  let run=0, hitFrom=-1;
  for(let i=0;i<N;i++){
    const wet=((prob[i]>=ALERT_CFG.humidProb)||(precip[i]>=3));
    const mild=(tmax[i]>=ALERT_CFG.humidTmaxLo && tmax[i]<=ALERT_CFG.humidTmaxHi);
    if(wet&&mild){ if(run===0) hitFrom=i; run++; if(run>=ALERT_CFG.humidDays) break; }
    else run=0;
  }
  if(run>=ALERT_CFG.humidDays){
    al.push({type:'disease', icon:'🦠', title:'病害に注意（多湿）',
      msg:dayLabel(hitFrom)+'（'+md(t[hitFrom])+'）ごろから多湿が続く予報。べと病・疫病・灰色かび病などが出やすい条件です。予防防除や見回り、写真診断の活用を。'});
  }
  return al;
}
async function loadAlerts(){
  const bar=document.getElementById('alertBar'); if(!bar) return;
  if(!CONFIG.GAS_URL) return;
  try{
    const res=await fetch(CONFIG.GAS_URL+'?action=forecast');
    const fc=await res.json();
    if(!fc||!fc.daily) return;
    const al=computeAlerts(fc.daily);
    if(!al.length){
      bar.innerHTML='<div class="alert calm"><span class="ai">🌤️</span><div>向こう数日、特筆すべき気象の注意はありません。</div></div>';
      return;
    }
    bar.innerHTML=al.map(a=>
      '<div class="alert '+a.type+'"><span class="ai">'+a.icon+'</span>'+
      '<div><div class="at">'+esc(a.title)+'</div><div>'+esc(a.msg)+'</div></div></div>'
    ).join('');
  }catch(e){ /* 取得失敗時はバナー非表示のまま */ }
}
loadAlerts();
